AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Copa Guru Backend

Globals:
  Function:
    Runtime: provided.al2
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 10
  Api:
    Auth:
      DefaultAuthorizer: BearerTokenAuthorizer
      Authorizers:
        BearerTokenAuthorizer:
          FunctionPayloadType: REQUEST
          FunctionArn: !GetAtt BearerAuthorizerFunction.Arn
          Identity:
            Headers:
              - Authorization
            ReauthorizeEvery: 0
    Cors:
      AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
    GatewayResponses:
      DEFAULT_4XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'*'"
            Access-Control-Allow-Headers: "'Content-Type,Authorization'"
            Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
      DEFAULT_5XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'*'"
            Access-Control-Allow-Headers: "'Content-Type,Authorization'"
            Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

Parameters:
  MongoDBDSN:
    Type: String
    Default: "mongodb://localhost:27017"
  MongoDBDatabaseName:
    Type: String
    Default: "copa-guru"
  JWTSecret:
    Type: String
    NoEcho: true
    Default: "copa-guru-local-jwt-secret-key"
  GoogleClientID:
    Type: String
    Default: ""
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ""
  FootballDataAPIKey:
    Type: String
    NoEcho: true
    Default: ""

Resources:
  CopaGuruApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: CopaGuruApi
      StageName: Prod

  BearerAuthorizerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-bearer-authorizer
      Handler: bootstrap
      CodeUri: lambdas/auth/bearer_authorizer
      MemorySize: 128
      Timeout: 5
      Environment:
        Variables:
          AUTH_JWT_SECRET: !Ref JWTSecret

  HealthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-health
      Handler: bootstrap
      CodeUri: lambdas/api/health
      Events:
        Api:
          Type: Api
          Properties:
            Path: /health
            Method: get
            RestApiId: !Ref CopaGuruApi
            Auth:
              Authorizer: NONE

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: "https://api.copa.guru"
