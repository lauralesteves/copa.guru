AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Copa Guru Backend

Globals:
  Function:
    Runtime: provided.al2
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 10

Parameters:
  MongoDBDSN:
    Type: String
    Default: "mongodb://localhost:27017"
  MongoDBDatabaseName:
    Type: String
    Default: "copa-guru"
  JWTSecret:
    Type: String
    NoEcho: true
    Default: "copa-guru-local-jwt-secret-key"
  GoogleClientID:
    Type: String
    Default: ""
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ""
  FootballDataAPIKey:
    Type: String
    NoEcho: true
    Default: ""

Resources:
  CopaGuruHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowOrigins:
          - https://copa.guru
          - http://localhost:5173

  HealthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-health
      Handler: bootstrap
      CodeUri: lambdas/api/health
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /health
            Method: get
            ApiId: !Ref CopaGuruHttpApi

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${CopaGuruHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
