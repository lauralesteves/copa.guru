AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Copa Guru Backend

Globals:
  Function:
    Runtime: provided.al2
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 10
  Api:
    Auth:
      DefaultAuthorizer: BearerTokenAuthorizer
      Authorizers:
        BearerTokenAuthorizer:
          FunctionPayloadType: REQUEST
          FunctionArn: !GetAtt BearerAuthorizerFunction.Arn
          Identity:
            Headers:
              - Authorization
            ReauthorizeEvery: 0
    Cors:
      AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
    GatewayResponses:
      DEFAULT_4XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'*'"
            Access-Control-Allow-Headers: "'Content-Type,Authorization'"
            Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
      DEFAULT_5XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'*'"
            Access-Control-Allow-Headers: "'Content-Type,Authorization'"
            Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

Parameters:
  MongoDBDSN:
    Type: String
    Default: "mongodb://localhost:27017"
  MongoDBDatabaseName:
    Type: String
    Default: "copa-guru"
  JWTSecret:
    Type: String
    NoEcho: true
    Default: "copa-guru-local-jwt-secret-key"
  GoogleClientID:
    Type: String
    Default: ""
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ""
  FootballDataAPIKey:
    Type: String
    NoEcho: true
    Default: ""

Resources:
  CopaGuruApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: CopaGuruApi
      StageName: Prod

  BearerAuthorizerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-bearer-authorizer
      Handler: bootstrap
      CodeUri: lambdas/auth/bearer_authorizer
      MemorySize: 128
      Timeout: 5
      Environment:
        Variables:
          AUTH_JWT_SECRET: !Ref JWTSecret

  HealthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-health
      Handler: bootstrap
      CodeUri: lambdas/api/health
      Events:
        Api:
          Type: Api
          Properties:
            Path: /health
            Method: get
            RestApiId: !Ref CopaGuruApi
            Auth:
              Authorizer: NONE

  GoogleLoginFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-auth-google-login
      Handler: bootstrap
      CodeUri: lambdas/api/auth/google_login
      Timeout: 30
      Environment:
        Variables:
          MONGODB_DSN: !Ref MongoDBDSN
          MONGODB_DATABASE_NAME: !Ref MongoDBDatabaseName
          AUTH_JWT_SECRET: !Ref JWTSecret
          GOOGLE_CLIENT_ID: !Ref GoogleClientID
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/google
            Method: post
            RestApiId: !Ref CopaGuruApi
            Auth:
              Authorizer: NONE

  RefreshFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-auth-refresh
      Handler: bootstrap
      CodeUri: lambdas/api/auth/refresh
      Environment:
        Variables:
          MONGODB_DSN: !Ref MongoDBDSN
          MONGODB_DATABASE_NAME: !Ref MongoDBDatabaseName
          AUTH_JWT_SECRET: !Ref JWTSecret
          GOOGLE_CLIENT_ID: !Ref GoogleClientID
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/refresh
            Method: post
            RestApiId: !Ref CopaGuruApi
            Auth:
              Authorizer: NONE

  LogoutFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-auth-logout
      Handler: bootstrap
      CodeUri: lambdas/api/auth/logout
      Environment:
        Variables:
          MONGODB_DSN: !Ref MongoDBDSN
          MONGODB_DATABASE_NAME: !Ref MongoDBDatabaseName
          AUTH_JWT_SECRET: !Ref JWTSecret
          GOOGLE_CLIENT_ID: !Ref GoogleClientID
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/logout
            Method: post
            RestApiId: !Ref CopaGuruApi

  MeFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-auth-me
      Handler: bootstrap
      CodeUri: lambdas/api/auth/me
      Environment:
        Variables:
          MONGODB_DSN: !Ref MongoDBDSN
          MONGODB_DATABASE_NAME: !Ref MongoDBDatabaseName
          AUTH_JWT_SECRET: !Ref JWTSecret
          GOOGLE_CLIENT_ID: !Ref GoogleClientID
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/me
            Method: get
            RestApiId: !Ref CopaGuruApi

  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-leaderboard-get
      Handler: bootstrap
      CodeUri: lambdas/api/leaderboard/get
      Environment:
        Variables:
          MONGODB_DSN: !Ref MongoDBDSN
          MONGODB_DATABASE_NAME: !Ref MongoDBDatabaseName
      Events:
        Api:
          Type: Api
          Properties:
            Path: /leaderboard
            Method: get
            RestApiId: !Ref CopaGuruApi
            Auth:
              Authorizer: NONE

  GetLeaderboardUserFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      FunctionName: copa-guru-leaderboard-get-user
      Handler: bootstrap
      CodeUri: lambdas/api/leaderboard/get_user
      Environment:
        Variables:
          MONGODB_DSN: !Ref MongoDBDSN
          MONGODB_DATABASE_NAME: !Ref MongoDBDatabaseName
      Events:
        Api:
          Type: Api
          Properties:
            Path: /leaderboard/{userId}
            Method: get
            RestApiId: !Ref CopaGuruApi
            Auth:
              Authorizer: NONE

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: "https://api.copa.guru"
